name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Build & Test
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Cache Swift packages
        uses: actions/cache@v6
        with:
          path: .spm
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Build and test
        run: |
          set -o pipefail
          xcodebuild test \
            -project WhisperScribe.xcodeproj \
            -scheme WhisperScribe \
            -configuration Debug \
            -destination 'platform=macOS,arch=arm64' \
            -clonedSourcePackagesDirPath .spm \
            -skipPackagePluginValidation \
            -skipMacroValidation

      # DeepSeekOCR2Kit is a SwiftPM package; its MLX/Metal-backed tests must run
      # under xcodebuild (the SwiftPM CLI `swift test` cannot load the MLX Metal
      # shader library). The parity tests are fixture-gated (`.enabled(if:
      # FixtureSupport.root != nil)`) and skip cleanly when Fixtures/ and the
      # model snapshot are absent, so CI runs only the pure-logic tests
      # (mask/grounding-parser/config/sanitizer/prompt-template).
      - name: Kit tests (DeepSeekOCR2Kit)
        run: |
          set -o pipefail
          cd DeepSeekOCR2Kit && xcodebuild test \
            -scheme DeepSeekOCR2Kit-Package \
            -destination 'platform=macOS' \
            -clonedSourcePackagesDirPath ../.spm \
            -skipPackagePluginValidation \
            -skipMacroValidation 2>&1 | tail -20
