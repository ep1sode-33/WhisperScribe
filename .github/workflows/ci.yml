name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Build & Test
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Cache Swift packages
        uses: actions/cache@v6
        with:
          path: .spm
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Build and test
        run: |
          set -o pipefail
          xcodebuild test \
            -project WhisperScribe.xcodeproj \
            -scheme WhisperScribe \
            -configuration Debug \
            -destination 'platform=macOS,arch=arm64' \
            -clonedSourcePackagesDirPath .spm \
            -skipPackagePluginValidation \
            -skipMacroValidation
