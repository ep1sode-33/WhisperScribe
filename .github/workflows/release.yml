name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to (re-)release, e.g. v1.2.3'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Test, build, package, publish
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Derive version from tag
        id: version
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Tag '$TAG' is not v<major>.<minor>.<patch>[-suffix]"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Cache Swift packages
        uses: actions/cache@v6
        with:
          path: .spm
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Test gate
        run: |
          set -o pipefail
          xcodebuild test \
            -project WhisperScribe.xcodeproj \
            -scheme WhisperScribe \
            -configuration Debug \
            -destination 'platform=macOS,arch=arm64' \
            -clonedSourcePackagesDirPath .spm \
            -skipPackagePluginValidation \
            -skipMacroValidation

      - name: Build Release
        run: |
          set -o pipefail
          xcodebuild build \
            -project WhisperScribe.xcodeproj \
            -scheme WhisperScribe \
            -configuration Release \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath build \
            -clonedSourcePackagesDirPath .spm \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            MARKETING_VERSION="${{ steps.version.outputs.version }}" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}"

      - name: Verify code signature (ad-hoc)
        run: |
          codesign --verify --deep --strict --verbose=2 \
            "build/Build/Products/Release/OmniScribe.app"

      - name: Package DMG
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p dist/dmg
          cp -R "build/Build/Products/Release/OmniScribe.app" dist/dmg/
          ln -s /Applications dist/dmg/Applications
          hdiutil create \
            -volname "OmniScribe $VERSION" \
            -srcfolder dist/dmg \
            -ov -format UDZO \
            "dist/OmniScribe-$VERSION.dmg"
          (cd dist && shasum -a 256 "OmniScribe-$VERSION.dmg" > checksums.txt)

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "${{ steps.version.outputs.tag }}" \
            "dist/OmniScribe-$VERSION.dmg" \
            "dist/checksums.txt" \
            --title "OmniScribe $VERSION" \
            --verify-tag \
            --generate-notes

